<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Miniwebhely | Kapcsolat</title>
    <meta
      name="description"
      content="Kapcsolat oldal a miniwebhely gyakorló feladatokhoz, egyszerű űrlappal és visszalinkkel." />
    <meta
      name="robots"
      content="index, follow" />
    <link
      rel="canonical"
      href="https://martszii.github.io/miniwebhely/contact.html" />

    <meta
      property="og:title"
      content="Miniwebhely | Kapcsolat" />
    <meta
      property="og:description"
      content="Kapcsolat oldal a miniwebhely gyakorló feladatokhoz, egyszerű űrlappal és visszalinkkel." />
    <meta
      property="og:image"
      content="https://martszii.github.io/miniwebhely/kepek/og-borito.jpg" />
    <meta
      property="og:url"
      content="https://martszii.github.io/miniwebhely/contact.html" />
    <meta
      property="og:type"
      content="website" />
    <meta
      property="og:locale"
      content="hu_HU" />
  </head>
  <body>
    <header>
      <a
        href="index.html"
        aria-label="Főoldal">
        <svg
          viewBox="0 0 120 120"
          width="96"
          height="96"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-labelledby="logo-cim">
          <title id="logo-cim">Miniwebhely rombusz logó</title>
          <polygon
            points="60,10 110,60 60,110 10,60"
            fill="#6d28d9" />
          <polygon
            points="60,22 98,60 60,98 22,60"
            fill="#c084fc"
            opacity="0.95" />
          <text
            x="60"
            y="69"
            text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="30"
            font-weight="700"
            fill="#ffffff">
            UM
          </text>
        </svg>
      </a>
      <nav aria-label="Főnavigáció">
        <ul>
          <li><a href="index.html">Főoldal</a></li>
          <li><a href="contact.html">Kapcsolat</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h1>Kapcsolat</h1>
        <p>Ez egy egyszerű kontakt oldal, amin a form mezőit és az alapvető validációt tudjuk gyakorolni.</p>
      </section>

      <section aria-labelledby="uzenetkuldes-cim">
        <h2 id="uzenetkuldes-cim">Üzenet küldése</h2>
        <form
          action="#"
          method="post">
          <p>
            <label for="nev">Felhasználónév</label><br />
            <input
              type="text"
              id="nev"
              name="nev"
              required
              autocomplete="username" />
          </p>

          <p>
            <label for="email">E-mail cím</label><br />
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email" />
          </p>

          <p>
            <label for="uzenet">Üzenet</label><br />
            <textarea
              id="uzenet"
              name="uzenet"
              rows="5"
              required></textarea>
          </p>

          <button type="submit">Küldés</button>
        </form>
      </section>

      <p><a href="index.html">Vissza a főoldalra</a></p>
    </main>

    <footer>
      <p>&copy; 2026 Miniwebhely</p>
    </footer>
  </body>
</html>
